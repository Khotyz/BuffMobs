modLoader = "javafml"
loaderVersion = "[4,)"
license = "${mod_license}"

[[mods]]
    modId = "${mod_id}"
    version = "${mod_version}"
    displayName = "${mod_name}"
    description = '''
Makes hostile and neutral mobs stronger, faster, and more challenging with progressive difficulty scaling.
'''
    logoFile = "META-INF/buffmobs.png"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "[21.11.37,)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version_range}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "configured"
    type = "optional"
    versionRange = "[2.7.3,)"
    ordering = "NONE"
    side = "CLIENT"
